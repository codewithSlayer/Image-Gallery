<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image_Galary_Website</title>
    <link rel="stylesheet" href="./style.css">
    <script src="https://kit.fontawesome.com/d2b30ad9de.js" crossorigin="anonymous"></script>
</head>

<body>

    <header class="header">
        <div class="logo"><a href="./index.html">Pixory</a></div>
        <div class="gallery"><a href="./gallery.html">Gallery</a></div>

        <div class="search-area">
            <input type="text" id="input-box" placeholder="Search for the pictures...." autocomplete="off"
                oninput="this.value.trim()==='' ? searchBtn.disabled=true : searchBtn.disabled=false">
            <button id="searchBtn" class="btn" onclick="searchResult()" disabled>Search</button>
        </div>
    </header>

    <main class="gallery-container"></main>

    <div style="display:flex;justify-content:center;margin-bottom:2rem;">
        <button id="showBtn" class="btn" onclick="showMore()">ShowMore</button>
    </div>

    <script src="./script.js" defer></script>
</body>

</html>
